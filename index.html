<script>
// Global error handler — displays any uncaught JavaScript error directly on the splash
// so the user can see what's wrong instead of staring at an infinite spinner.
window.addEventListener("error",function(ev){
  var errEl=document.getElementById("splash-err");
  if(errEl){
    var msg=ev.message||"Unknown error";
    var src=(ev.filename||"").split("/").pop();
    errEl.innerHTML+="<div style='margin-bottom:8px'>❌ "+msg+(ev.lineno?" (line "+ev.lineno+")":"")+(src?" in "+src:"")+"</div>";
  }
});
window.addEventListener("unhandledrejection",function(ev){
  var errEl=document.getElementById("splash-err");
  if(errEl){
    errEl.innerHTML+="<div style='margin-bottom:8px'>⚠️ Promise error: "+(ev.reason?.message||String(ev.reason))+"</div>";
  }
});
// Emergency timeout — if the app hasn't started after 10 seconds, show reload button
setTimeout(function(){
  var splash=document.getElementById("splash");
  if(splash&&!splash.classList.contains("hidden")){
    var msg=document.getElementById("splash-msg");
    if(msg){
      msg.innerHTML="Taking longer than expected...<br><a href='javascript:location.reload()' style='color:#10b981;text-decoration:underline'>Tap to reload</a>";
    }
  }
},10000);
</script>

// ── CUSTOM PIE CHART ──
// A lightweight SVG donut chart — no external chart library needed.
// More reliable than CDN-loaded chart libraries in Telegram's WebView.
function SimplePieChart({data,size=180,innerR=52,outerR=82}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  const cx=size/2,cy=size/2;
  let cum=-Math.PI/2; // start at 12 o'clock
  const slices=data.map((d,i)=>{
    const a=(d.value/total)*Math.PI*2;
    const s0=cum,s1=cum+a;
    cum=s1;
    const x1=cx+outerR*Math.cos(s0),y1=cy+outerR*Math.sin(s0);
    const x2=cx+outerR*Math.cos(s1),y2=cy+outerR*Math.sin(s1);
    const x3=cx+innerR*Math.cos(s1),y3=cy+innerR*Math.sin(s1);
    const x4=cx+innerR*Math.cos(s0),y4=cy+innerR*Math.sin(s0);
    const large=a>Math.PI?1:0;
    // Handle the edge case of a single 100% slice which would collapse the path
    const path=a>=Math.PI*2-0.001
      ?`M ${cx-outerR} ${cy} A ${outerR} ${outerR} 0 1 1 ${cx+outerR} ${cy} A ${outerR} ${outerR} 0 1 1 ${cx-outerR} ${cy} M ${cx-innerR} ${cy} A ${innerR} ${innerR} 0 1 0 ${cx+innerR} ${cy} A ${innerR} ${innerR} 0 1 0 ${cx-innerR} ${cy} Z`
      :`M ${x1} ${y1} A ${outerR} ${outerR} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${innerR} ${innerR} 0 ${large} 0 ${x4} ${y4} Z`;
    return{path,color:d.color,name:d.name};
  });
  return(
    <svg width="100%" height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block",margin:"0 auto",maxWidth:size}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="rgba(0,0,0,0.15)" strokeWidth="1"/>)}
    </svg>
  );
}

// ── STORAGE ──
// Telegram CloudStorage syncs data across devices for the same Telegram user.
// Falls back to localStorage if not running inside Telegram.
const CS = window.Telegram?.WebApp?.CloudStorage;
const CS_AVAILABLE = !!(CS && typeof CS.setItem === "function");

const LS={
  get:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  remove:(k)=>{try{localStorage.removeItem(k);}catch{}}
};

// Promise wrappers for Telegram CloudStorage callback API.
// Each call has a hard 2.5s timeout — if CloudStorage silently hangs
// (which can happen in certain Telegram contexts), the wrapper resolves
// to a safe fallback value and the app continues via localStorage.
const CS_TIMEOUT=2500;
const withTimeout=(fn,fallback)=>new Promise((resolve)=>{
  let done=false;
  const finish=(v)=>{if(!done){done=true;resolve(v);}};
  setTimeout(()=>finish(fallback),CS_TIMEOUT);
  try{fn(finish);}catch{finish(fallback);}
});

const csGetItem=(key)=>withTimeout(
  (done)=>CS.getItem(key,(err,val)=>done(err?null:val)),
  null
);
const csGetItems=(keys)=>withTimeout(
  (done)=>CS.getItems(keys,(err,vals)=>done(err?{}:(vals||{}))),
  {}
);
const csSetItem=(key,val)=>withTimeout(
  (done)=>CS.setItem(key,val,(err)=>done(!err)),
  false
);
const csRemoveItem=(key)=>withTimeout(
  (done)=>CS.removeItem(key,(err)=>done(!err)),
  false
);
const csGetKeys=()=>withTimeout(
  (done)=>CS.getKeys((err,keys)=>done(err?[]:(keys||[]))),
  []
);

// High-level storage: writes to both CloudStorage (if available) and localStorage.
// Reads prefer CloudStorage, falling back to localStorage.
const STORE={
  async get(key,def){
    if(CS_AVAILABLE){
      const val=await csGetItem(key);
      if(val){try{return JSON.parse(val);}catch{}}
    }
    return LS.get(key,def);
  },
  async set(key,value){
    LS.set(key,value);
    if(CS_AVAILABLE){
      const str=JSON.stringify(value);
      // CloudStorage has a 4096 char limit per value. Small items fit fine.
      if(str.length<=4096)await csSetItem(key,str);
    }
  },
  async remove(key){
    LS.remove(key);
    if(CS_AVAILABLE)await csRemoveItem(key);
  },
  // Transactions are stored individually as ft_txn_{id} because the array
  // can grow beyond the 4096 char per-value limit.
  async getAllTransactions(){
    if(CS_AVAILABLE){
      const keys=await csGetKeys();
      const txnKeys=keys.filter(k=>k.startsWith("ft_txn_"));
      if(txnKeys.length>0){
        const items=await csGetItems(txnKeys);
        return Object.values(items).map(v=>{try{return JSON.parse(v);}catch{return null;}}).filter(Boolean);
      }
    }
    return LS.get("ft_transactions",[]);
  },
  async saveTransaction(txn){
    const allLocal=LS.get("ft_transactions",[]);
    const filtered=allLocal.filter(t=>t.id!==txn.id);
    LS.set("ft_transactions",[...filtered,txn]);
    if(CS_AVAILABLE)await csSetItem(`ft_txn_${txn.id}`,JSON.stringify(txn));
  },
  async deleteTransaction(id){
    const allLocal=LS.get("ft_transactions",[]);
    LS.set("ft_transactions",allLocal.filter(t=>t.id!==id));
    if(CS_AVAILABLE)await csRemoveItem(`ft_txn_${id}`);
  }
};

// ── LIVE EXCHANGE RATES ──
// Fetches real-time rates from free public APIs. No API key required.
// - Fiat (USD, EUR): exchangerate-api (open access, no key)
// - Crypto (BTC, ETH, USDT): CoinGecko public API
// Returns an object like {KZT:1, USD:520, EUR:560, USDT:520, BTC:35000000, ETH:1750000}
// Each value = how many KZT equals 1 unit of that currency.
const fetchLiveRates=async()=>{
  const rates={KZT:1};
  try{
    // Fiat rates (USD, EUR) — converts from USD base, then cross-rates via USD→KZT
    const fiatRes=await fetch("https://open.er-api.com/v6/latest/USD");
    const fiatData=await fiatRes.json();
    if(fiatData?.rates?.KZT){
      const usdToKzt=fiatData.rates.KZT;
      rates.USD=usdToKzt;
      rates.EUR=fiatData.rates.EUR?usdToKzt/fiatData.rates.EUR:560;
      rates.USDT=usdToKzt; // USDT tracks USD 1:1
    }
  }catch(e){console.warn("Fiat rate fetch failed:",e);}

  try{
    // Crypto rates from CoinGecko — returns prices in USD, we convert to KZT
    const cryptoRes=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd");
    const cryptoData=await cryptoRes.json();
    const usdKzt=rates.USD||520;
    if(cryptoData?.bitcoin?.usd)rates.BTC=cryptoData.bitcoin.usd*usdKzt;
    if(cryptoData?.ethereum?.usd)rates.ETH=cryptoData.ethereum.usd*usdKzt;
    if(cryptoData?.tether?.usd)rates.USDT=cryptoData.tether.usd*usdKzt;
  }catch(e){console.warn("Crypto rate fetch failed:",e);}

  return rates;
};

// ── ADD TRANSACTION MODAL ──
function AddModal({open,onClose,accounts,categories,settings,onSave,t,initMode}){
  const[mode,setMode]=useState(initMode||"expense");
  const[amount,setAmount]=useState("");
  const[accountId,setAccountId]=useState(accounts[0]?.id||"");
  const[toAccountId,setToAccountId]=useState(accounts[1]?.id||"");
  // Per-transaction currency lets users record e.g. a USD expense from a KZT bank account
  const[currency,setCurrency]=useState("KZT");
  const[categoryId,setCategoryId]=useState("");
  const[subcategoryId,setSubcategoryId]=useState("");
  const[note,setNote]=useState("");
  const[date,setDate]=useState(new Date().toISOString().split("T")[0]);
  // Time of transaction (HH:MM format), defaults to current local time
  const[time,setTime]=useState(()=>{
    const d=new Date();
    return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  });
  // Custom exchange rate for transfers — null means "use the auto-fetched rate from settings"
  const[customRate,setCustomRate]=useState(null);
  const[loading,setLoading]=useState(false);

  // The currently selected "from" account determines which currencies can be used
  const selAcc=accounts.find(a=>a.id===accountId);
  const availableCurrencies=selAcc?getAccountCurrencies(selAcc.type):["KZT"];

  // When the From account changes, if the chosen currency isn't valid for that account type, reset to the account's default
  useEffect(()=>{
    if(selAcc&&!availableCurrencies.includes(currency)){
      setCurrency(selAcc.currency||availableCurrencies[0]);
    }
  },[accountId]);

  // CRITICAL FIX: When the From account changes, ensure the To account is different.
  // Without this, the To dropdown filters out the new From account but the underlying
  // toAccountId state can still point to it, causing "transfer to same account" bugs.
  useEffect(()=>{
    if(toAccountId===accountId||!accounts.find(a=>a.id===toAccountId)){
      const firstOther=accounts.find(a=>a.id!==accountId);
      if(firstOther)setToAccountId(firstOther.id);
    }
    // Reset custom rate when accounts change so live rate is used by default
    setCustomRate(null);
  },[accountId,accounts]);

  useEffect(()=>{
    if(open){
      setMode(initMode||"expense");
      setAmount("");setNote("");setCategoryId("");setSubcategoryId("");
      setCustomRate(null);
      // Reset date and time to "now" each time the modal opens
      const now=new Date();
      setDate(now.toISOString().split("T")[0]);
      setTime(`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`);
      // Default currency = selected account's native currency
      const acc=accounts.find(a=>a.id===accountId);
      if(acc)setCurrency(acc.currency);
    }
  },[open,initMode]);

  const selCat=categories.find(c=>c.id===categoryId);
  const filteredCategories=categories.filter(c=>categoryMatchesMode(c,mode));
  const handleModeChange=(newMode)=>{
    setMode(newMode);
    setCategoryId("");
    setSubcategoryId("");
  };

  // For transfers: compute how much the destination account will receive.
  // Default uses the live exchange rate, but customRate (if set) overrides it.
  // The rate represents "1 source-currency unit = X destination-currency units".
  const toAcc=accounts.find(a=>a.id===toAccountId);
  const autoRate=useMemo(()=>{
    if(!selAcc||!toAcc)return 1;
    if(selAcc.currency===toAcc.currency)return 1;
    const rates=settings.exchangeRates||{};
    // Cross-rate via KZT: 1 source = X KZT = X / dest_rate destination units
    return(rates[selAcc.currency]||1)/(rates[toAcc.currency]||1);
  },[selAcc,toAcc,settings.exchangeRates]);
  const effectiveRate=customRate!=null?+customRate:autoRate;
  const transferConverted=useMemo(()=>{
    if(mode!=="transfer"||!selAcc||!toAcc||!amount||isNaN(+amount))return null;
    return{amount:(+amount)*effectiveRate,currency:toAcc.currency};
  },[mode,selAcc,toAcc,amount,effectiveRate]);

  const handleSave=async()=>{
    if(!amount||isNaN(+amount)||+amount<=0)return;
    // Safety check: prevent transfer to the same account (would otherwise lose money on screen)
    if(mode==="transfer"&&accountId===toAccountId){
      alert("Source and destination accounts must be different.");
      return;
    }
    haptic();
    const acc=accounts.find(a=>a.id===accountId);
    // For non-transfers, use the selected transaction currency.
    // For transfers, we record the outgoing amount in the source account's currency
    // and handle the destination conversion via toAmount/toCurrency.
    const txnCurrency=mode==="transfer"?(acc?.currency||"KZT"):currency;
    const txn={
      id:uid(),type:mode,amount:+amount,currency:txnCurrency,
      accountId,toAccountId:mode==="transfer"?toAccountId:null,
      categoryId:categoryId||null,subcategoryId:subcategoryId||null,
      note,date:new Date(`${date}T${time||"00:00"}`).toISOString(),aiComment:null,
      // For transfers, store the converted destination amount AND the rate used,
      // so the same conversion is reversed exactly when the transaction is deleted.
      toAmount:mode==="transfer"&&transferConverted?transferConverted.amount:null,
      toCurrency:mode==="transfer"&&transferConverted?transferConverted.currency:null,
      transferRate:mode==="transfer"?effectiveRate:null
    };
    if((mode==="expense"||mode==="income")&&settings.aiEnabled){
      setLoading(true);
      const cat=categories.find(c=>c.id===categoryId);
      const sub=cat?.subcategories?.find(s=>s.id===subcategoryId);
      const comment=await getAIComment(mode,+amount,txnCurrency,cat?.name||"",sub?.name||"",note,settings);
      txn.aiComment=comment;
      setLoading(false);
    }
    onSave(txn);
    onClose();
  };

  const modes=[{k:"expense",l:"Expense",c:"#ef4444"},{k:"income",l:"Income",c:"#10b981"},{k:"transfer",l:"Transfer",c:"#3b82f6"}];

  return(
    <Modal open={open} onClose={onClose} title="Add Transaction" t={t}>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {modes.map(({k,l,c})=>(
          <button key={k} onClick={()=>handleModeChange(k)} style={{flex:1,padding:"9px 0",borderRadius:10,border:`1.5px solid ${k===mode?c:t.border}`,background:k===mode?c+"22":"transparent",color:k===mode?c:t.textMuted,fontWeight:500,fontSize:13,cursor:"pointer",fontFamily:"system-ui,sans-serif"}}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Amount</div>
          <div style={{display:"flex",gap:8}}>
            <input value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" type="number" style={{flex:1,minWidth:0,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"13px 14px",fontSize:24,fontFamily:"monospace",fontWeight:500}}/>
            {/* Currency picker — only shown for income/expense, not transfers (transfers use source account's currency) */}
            {mode!=="transfer"&&(
              <select value={currency} onChange={e=>setCurrency(e.target.value)} style={{background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"0 12px",fontSize:14,fontWeight:600,cursor:"pointer",minWidth:80,flexShrink:0}}>
                {availableCurrencies.map(c=><option key={c} value={c}>{sym[c]} {c}</option>)}
              </select>
            )}
          </div>
        </div>
        <div>
          <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>From Account</div>
          <select value={accountId} onChange={e=>setAccountId(e.target.value)} style={{width:"100%",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 14px",fontSize:15,cursor:"pointer"}}>
            {accounts.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} ({a.currency})</option>)}
          </select>
        </div>
        {mode==="transfer"&&(
          <div>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>To Account</div>
            <select value={toAccountId} onChange={e=>setToAccountId(e.target.value)} style={{width:"100%",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 14px",fontSize:15,cursor:"pointer"}}>
              {accounts.filter(a=>a.id!==accountId).map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} ({a.currency})</option>)}
            </select>
            {/* Cross-currency: show editable rate field with live default + arrival preview */}
            {selAcc&&toAcc&&selAcc.currency!==toAcc.currency&&(
              <div style={{marginTop:10,padding:"12px",background:t.bgCard2,borderRadius:10,display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:t.textMuted}}>Exchange rate</span>
                  {customRate!=null&&(
                    <span onClick={()=>setCustomRate(null)} style={{fontSize:11,color:"#10b981",cursor:"pointer",textDecoration:"underline"}}>Use live rate</span>
                  )}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:t.text}}>
                  <span style={{fontFamily:"monospace",color:t.textMuted}}>1 {selAcc.currency} =</span>
                  <input
                    type="number"
                    step="any"
                    value={customRate!=null?customRate:autoRate.toFixed(autoRate>=100?2:6)}
                    onChange={e=>setCustomRate(e.target.value)}
                    style={{flex:1,minWidth:0,background:t.bgInput,color:t.text,border:`1px solid ${customRate!=null?"#10b981":t.border}`,borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"monospace",textAlign:"right"}}
                  />
                  <span style={{fontFamily:"monospace",color:t.textMuted}}>{toAcc.currency}</span>
                </div>
                <div style={{fontSize:11,color:t.textMuted,fontStyle:"italic"}}>
                  {customRate!=null?"📝 Using your rate":"🌐 Live rate (tap to override)"}
                </div>
                {transferConverted&&(
                  <div style={{paddingTop:8,borderTop:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:8,fontSize:13}}>
                    <span>💱</span>
                    <span style={{color:t.textMuted}}>Will arrive:</span>
                    <span style={{color:t.text,fontWeight:600,fontFamily:"monospace",marginLeft:"auto"}}>{fmtFull(transferConverted.amount,transferConverted.currency)}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {mode!=="transfer"&&(
          <div>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Category</div>
            <select value={categoryId} onChange={e=>{setCategoryId(e.target.value);setSubcategoryId("");}} style={{width:"100%",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 14px",fontSize:15,cursor:"pointer"}}>
              <option value="">— Select category —</option>
              {filteredCategories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
            </select>
          </div>
        )}
        {mode!=="transfer"&&selCat?.subcategories?.length>0&&(
          <div>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Subcategory</div>
            <select value={subcategoryId} onChange={e=>setSubcategoryId(e.target.value)} style={{width:"100%",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 14px",fontSize:15,cursor:"pointer"}}>
              <option value="">— Select subcategory —</option>
              {selCat.subcategories.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
        )}
        <div style={{display:"flex",gap:10,width:"100%"}}>
          <div style={{flex:"3 1 0",minWidth:0,overflow:"hidden"}}>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Date</div>
            <input value={date} onChange={e=>setDate(e.target.value)} type="date" style={{width:"100%",maxWidth:"100%",display:"block",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 8px",fontSize:13,boxSizing:"border-box",textAlign:"center",WebkitAppearance:"none"}}/>
          </div>
          <div style={{flex:"2 1 0",minWidth:0,overflow:"hidden"}}>
            <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Time</div>
            <input value={time} onChange={e=>setTime(e.target.value)} type="time" style={{width:"100%",maxWidth:"100%",display:"block",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 8px",fontSize:13,boxSizing:"border-box",textAlign:"center",WebkitAppearance:"none"}}/>
          </div>
        </div>
        <div>
          <div style={{fontSize:13,color:t.textMuted,marginBottom:5}}>Note</div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a note..." style={{width:"100%",background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:10,padding:"11px 14px",fontSize:15}}/>
        </div>
        <div style={{marginTop:4}}>
          {loading?(
            <div style={{textAlign:"center",padding:"14px 0",color:t.accent,fontSize:14}}>{(PETS[settings.aiPet]||PETS.dog).emoji} Your {(PETS[settings.aiPet]||PETS.dog).name} is thinking...</div>
          ):(
            <button onClick={handleSave} style={{width:"100%",background:"#10b981",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"system-ui,sans-serif"}}>Save Transaction</button>
          )}
        </div>
      </div>
    </Modal>
  );
}

function HomeScreen({accounts,transactions,categories,fixedExpenses,settings,onSettingsChange,onAddTxn,t,onTxnClick}){
  const{selectedCurrency,balanceHidden,exchangeRates}=settings;
  const quoteIdx=useMemo(()=>Math.floor(Date.now()/86400000)%QUOTES.length,[]);
  const quote=QUOTES[quoteIdx];
  const currencies=settings.activeCurrencies||["KZT","USD","EUR","USDT"];
  const cycleCur=()=>{const i=currencies.indexOf(selectedCurrency);onSettingsChange({...settings,selectedCurrency:currencies[(i+1)%currencies.length]});};
  const totalKZT=accounts.reduce((s,a)=>s+toKZT(a.balance,a.currency,exchangeRates),0);
  const total=fromKZT(totalKZT,selectedCurrency,exchangeRates);
  const now=new Date();
  const monthTxns=transactions.filter(tx=>sameMonth(tx.date,now.getFullYear(),now.getMonth()));
  const monthIncome=monthTxns.filter(t=>t.type==="income").reduce((s,t)=>s+toKZT(t.amount,t.currency,exchangeRates),0);
  const monthExpense=monthTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+toKZT(t.amount,t.currency,exchangeRates),0);
  const upcomingFixed=fixedExpenses.filter(fe=>{
    const paid=monthTxns.some(t=>t.type==="expense"&&t.note&&t.note.toLowerCase().includes(fe.name.toLowerCase()));
    return!paid;
  });
  const totalFixed=upcomingFixed.reduce((s,fe)=>s+toKZT(fe.amount,fe.currency,exchangeRates),0);
  const remaining=monthIncome-monthExpense-totalFixed;
  const recentTxns=transactions.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  return(
    <div style={{height:"100%",overflow:"auto",paddingBottom:16}}>

              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>Income</div>
              <div style={{fontSize:16,fontWeight:600,color:"#10b981"}}>{fmtAmt(fromKZT(monthIncome,selectedCurrency,exchangeRates),selectedCurrency)}</div>

            <div style={{width:1,background:"rgba(255,255,255,0.15)"}}/>
            <div style={{textAlign:"center"}}>

        <div style={{display:"flex",gap:8}}>
          {[{l:"＋ Income",m:"income",c:"#10b981"},{l:"－ Expense",m:"expense",c:"#ef4444"},{l:"⇄ Transfer",m:"transfer",c:"#3b82f6"}].map(({l,m,c})=>(
            <button key={m} onClick={()=>{haptic();onAddTxn(m);}} style={{flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${c}`,background:`${c}22`,color:c,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"system-ui,sans-serif"}}>{l}</button>
          ))}

      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* Quote */}
        <div style={{background:"linear-gradient(135deg,#064e3b,#065f46)",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:4}}>💡 Financial Wisdom</div>
          <div style={{fontSize:14,color:"#fff",lineHeight:1.55,fontStyle:"italic"}}>"{quote.q}"</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:6}}>— {quote.a}</div>
        </div>

        {/* Accounts */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:16,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif",marginBottom:10}}>My Accounts</div>
          <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>
            {accounts.map(acc=>(
              <div key={acc.id} style={{minWidth:148,background:t.bgCard,borderRadius:14,padding:"14px",border:`1px solid ${t.border}`,flexShrink:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{width:34,height:34,borderRadius:9,background:acc.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{acc.icon}</div>
                  <span style={{fontSize:10,color:t.textMuted,background:t.bgInput,borderRadius:6,padding:"2px 7px",textTransform:"uppercase",letterSpacing:"0.5px"}}>{acc.type}</span>
                </div>
                <div style={{fontSize:12,color:t.textMuted,marginBottom:3}}>{acc.name}</div>
                <div style={{fontSize:17,fontWeight:700,color:t.text,fontFamily:"monospace"}}>{balanceHidden?"••••":fmtAmt(acc.balance,acc.currency)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Upcoming Fixed */}
        {upcomingFixed.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif",marginBottom:10}}>📅 Upcoming Fixed</div>
            <div style={{background:t.bgCard,borderRadius:14,border:`1px solid ${t.border}`,overflow:"hidden"}}>
              {upcomingFixed.map((fe,i)=>(
                <div key={fe.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:i<upcomingFixed.length-1?`1px solid ${t.border}`:"none"}}>
                  <div>
                    <div style={{fontSize:14,color:t.text,fontWeight:500}}>{fe.name}</div>
                    <div style={{fontSize:11,color:t.textMuted}}>Due: {fe.dayOfMonth}th of month</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#ef4444",fontFamily:"monospace"}}>-{fmtAmt(fe.amount,fe.currency)}</div>
                </div>
              ))}
              <div style={{padding:"12px 14px",background:t.bgCard2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:t.textMuted}}>Remaining budget</span>
                <span style={{fontSize:15,fontWeight:700,color:remaining>=0?"#10b981":"#ef4444",fontFamily:"monospace"}}>{fmtAmt(fromKZT(remaining,selectedCurrency,exchangeRates),selectedCurrency)}</span>
              </div>
            </div>
          </div>
        )}

        {/* Recent Transactions */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:16,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif",marginBottom:10}}>Recent Transactions</div>
          {recentTxns.length===0&&(
            <div style={{textAlign:"center",padding:"32px",color:t.textMuted,fontSize:14}}>
              <div style={{fontSize:32,marginBottom:8}}>💰</div>
              No transactions yet. Add your first one!
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {recentTxns.map(txn=>{
              const acc=accounts.find(a=>a.id===txn.accountId);
              const toAcc=accounts.find(a=>a.id===txn.toAccountId);
              const cat=categories.find(c=>c.id===txn.categoryId);
              const color=txn.type==="expense"?"#ef4444":txn.type==="income"?"#10b981":"#3b82f6";
              const sign=txn.type==="expense"?"-":txn.type==="income"?"+":"";
              const isTransfer=txn.type==="transfer";
              // Show both arrival amount alongside the outgoing amount when it's a cross-currency transfer
              const showBothAmounts=isTransfer&&txn.toAmount!=null&&txn.toCurrency&&txn.toCurrency!==txn.currency;
              return(
                <div key={txn.id} onClick={()=>onTxnClick(txn)} style={{background:t.bgCard,borderRadius:14,padding:"12px 14px",border:`1px solid ${t.border}`,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
                      <div style={{width:38,height:38,borderRadius:10,background:(isTransfer?"#3b82f6":(cat?.color||"#64748b"))+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{isTransfer?"⇄":cat?.icon||"💸"}</div>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{fontSize:14,fontWeight:500,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {isTransfer?(
                            <span>{acc?.name||"?"} <span style={{color:t.textMuted}}>→</span> {toAcc?.name||"?"}</span>
                          ):(cat?.name||"Unknown")}
                        </div>
                        <div style={{fontSize:11,color:t.textMuted}}>
                          {isTransfer?"Transfer":(acc?.name||"")} · {new Date(txn.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})} · {fmtTime(txn.date)}
                        </div>
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:16,fontWeight:700,color,fontFamily:"monospace"}}>{sign}{fmtAmt(txn.amount,txn.currency)}</div>
                      {showBothAmounts&&(
                        <div style={{fontSize:11,color:t.textMuted,fontFamily:"monospace",marginTop:2}}>→ +{fmtAmt(txn.toAmount,txn.toCurrency)}</div>
                      )}
                    </div>
                  </div>
                  {txn.aiComment&&(
                    <PetCommentBlock comment={txn.aiComment} petEmoji={(PETS[settings.aiPet]||PETS.dog).emoji} t={t}/>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ANALYTICS SCREEN ──
function AnalyticsScreen({transactions,categories,settings,t}){
  const now=new Date();
  const{selectedCurrency,exchangeRates}=settings;

  // ─ Pie chart filter: independent date range ─
  // Default: this month so first-time users see something useful immediately.
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const toDateStr=(d)=>d.toISOString().split("T")[0];
  const[pieFromDate,setPieFromDate]=useState(toDateStr(monthStart));
  const[pieToDate,setPieToDate]=useState(toDateStr(today));
  // Quick-select preset chips for common ranges
  const applyRangePreset=(presetKey)=>{
    const t=new Date();
    let from,to=new Date(t.getFullYear(),t.getMonth(),t.getDate());
    if(presetKey==="thisMonth")from=new Date(t.getFullYear(),t.getMonth(),1);
    else if(presetKey==="lastMonth"){from=new Date(t.getFullYear(),t.getMonth()-1,1);to=new Date(t.getFullYear(),t.getMonth(),0);}
    else if(presetKey==="last30")from=new Date(t.getFullYear(),t.getMonth(),t.getDate()-29);
    else if(presetKey==="last7")from=new Date(t.getFullYear(),t.getMonth(),t.getDate()-6);
    else if(presetKey==="thisYear")from=new Date(t.getFullYear(),0,1);
    setPieFromDate(toDateStr(from));setPieToDate(toDateStr(to));
  };

  // ─ Calendar (daily heatmap) filter: month-by-month navigation, separate from pie ─
  const[calYear,setCalYear]=useState(now.getFullYear());
  const[calMonth,setCalMonth]=useState(now.getMonth());
  const prevCalMonth=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
  const nextCalMonth=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};

  // ─ Pie chart data: filtered by the independent date range ─
  const pieRangeData=useMemo(()=>{
    // End-of-day inclusive range so transactions on the toDate are included
    const fromTs=new Date(`${pieFromDate}T00:00:00`).getTime();
    const toTs=new Date(`${pieToDate}T23:59:59`).getTime();
    const filtered=transactions.filter(tx=>{
      if(tx.type!=="expense")return false;
      const ts=new Date(tx.date).getTime();
      return ts>=fromTs&&ts<=toTs;
    });
    const totalKzt=filtered.reduce((s,tx)=>s+toKZT(tx.amount,tx.currency,exchangeRates),0);
    const incomeKzt=transactions.filter(tx=>{
      if(tx.type!=="income")return false;
      const ts=new Date(tx.date).getTime();
      return ts>=fromTs&&ts<=toTs;
    }).reduce((s,tx)=>s+toKZT(tx.amount,tx.currency,exchangeRates),0);
    const bycat={};
    filtered.forEach(tx=>{
      const cat=categories.find(c=>c.id===tx.categoryId);
      const key=cat?.id||"other";
      if(!bycat[key])bycat[key]={name:cat?.name||"Other",icon:cat?.icon||"❓",color:cat?.color||"#64748b",value:0};
      bycat[key].value+=toKZT(tx.amount,tx.currency,exchangeRates);
    });
    return{
      slices:Object.values(bycat).sort((a,b)=>b.value-a.value),
      totalExp:totalKzt,
      totalInc:incomeKzt,
      txnCount:filtered.length
    };
  },[transactions,categories,exchangeRates,pieFromDate,pieToDate]);

  // ─ Calendar data: per-day expense totals for the selected calendar month ─
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const dayTotals=useMemo(()=>{
    const arr=[];
    for(let d=1;d<=daysInMonth;d++){
      const dayExp=transactions.filter(tx=>tx.type==="expense"&&sameDay(tx.date,calYear,calMonth,d))
        .reduce((s,tx)=>s+toKZT(tx.amount,tx.currency,exchangeRates),0);
      arr.push({day:d,amount:dayExp});
    }
    return arr;
  },[transactions,calYear,calMonth,daysInMonth,exchangeRates]);
  const calMonthTotal=dayTotals.reduce((s,d)=>s+d.amount,0);

  // Format an amount compactly for tight calendar cells: 1500 → "1.5K", 25000 → "25K", 1200000 → "1.2M"
  const fmtCompact=(n)=>{
    if(n===0)return"";
    if(n>=1000000)return`${(n/1000000).toFixed(1).replace(/\.0$/,"")}M`;
    if(n>=1000)return`${(n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,"")}K`;
    return Math.round(n).toString();
  };

  const presets=[
    {k:"last7",l:"7d"},
    {k:"last30",l:"30d"},
    {k:"thisMonth",l:"This month"},
    {k:"lastMonth",l:"Last month"},
    {k:"thisYear",l:"Year"}
  ];

  return(
    <div style={{height:"100%",overflow:"auto",padding:"calc(env(safe-area-inset-top, 20px) + 40px) 16px 16px"}}>
      <div style={{fontFamily:"system-ui,sans-serif",fontSize:22,fontWeight:700,color:t.text,marginBottom:16}}>Analytics</div>

      {/* ─────── Pie Chart card with own date range ─────── */}
      <div style={{background:t.bgCard,borderRadius:16,padding:"16px",border:`1px solid ${t.border}`,marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif",marginBottom:10}}>Spending by Category</div>

        {/* Quick preset chips */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {presets.map(({k,l})=>(
            <button key={k} onClick={()=>applyRangePreset(k)} style={{background:t.bgInput,color:t.textMuted,border:`1px solid ${t.border}`,borderRadius:14,padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:500}}>
              {l}
            </button>
          ))}
        </div>

        {/* Custom date range pickers */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14,padding:"10px 12px",background:t.bgInput,borderRadius:10}}>
          <input type="date" value={pieFromDate} onChange={e=>setPieFromDate(e.target.value)} style={{flex:1,minWidth:0,background:"transparent",color:t.text,border:"none",fontSize:12,padding:0,fontFamily:"system-ui,sans-serif",WebkitAppearance:"none"}}/>
          <span style={{color:t.textMuted,fontSize:12}}>→</span>
          <input type="date" value={pieToDate} onChange={e=>setPieToDate(e.target.value)} style={{flex:1,minWidth:0,background:"transparent",color:t.text,border:"none",fontSize:12,padding:0,fontFamily:"system-ui,sans-serif",WebkitAppearance:"none"}}/>
        </div>

        {/* Summary numbers for the selected range */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {l:"Income",v:pieRangeData.totalInc,c:"#10b981"},
            {l:"Spent",v:pieRangeData.totalExp,c:"#ef4444"},
            {l:"Net",v:pieRangeData.totalInc-pieRangeData.totalExp,c:"#3b82f6"}
          ].map(({l,v,c})=>(
            <div key={l} style={{background:t.bgInput,borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:10,color:t.textMuted,marginBottom:2}}>{l}</div>
              <div style={{fontSize:11,fontWeight:700,color:c,fontFamily:"monospace"}}>{fmtAmt(fromKZT(v,selectedCurrency,exchangeRates),selectedCurrency)}</div>
            </div>
          ))}
        </div>

        {pieRangeData.slices.length>0?(
          <>
            <SimplePieChart data={pieRangeData.slices}/>
            <div style={{textAlign:"center",marginTop:-110,marginBottom:92,fontSize:18,fontWeight:700,color:t.text,fontFamily:"monospace",pointerEvents:"none"}}>
              {fmtAmt(fromKZT(pieRangeData.totalExp,selectedCurrency,exchangeRates),selectedCurrency)}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
              {pieRangeData.slices.map(d=>{
                const pct=pieRangeData.totalExp>0?((d.value/pieRangeData.totalExp)*100).toFixed(1):0;
                const bar=pieRangeData.totalExp>0?(d.value/pieRangeData.totalExp)*100:0;
                return(
                  <div key={d.name}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{width:10,height:10,borderRadius:2,background:d.color,flexShrink:0}}/>
                      <span style={{fontSize:13,color:t.text,flex:1}}>{d.icon} {d.name}</span>
                      <span style={{fontSize:12,color:t.textMuted}}>{pct}%</span>
                      <span style={{fontSize:13,fontWeight:600,color:t.text,fontFamily:"monospace"}}>{fmtAmt(fromKZT(d.value,selectedCurrency,exchangeRates),selectedCurrency)}</span>
                    </div>
                    <div style={{height:3,background:t.bgInput,borderRadius:2}}><div style={{height:"100%",width:`${bar}%`,background:d.color,borderRadius:2}}/></div>
                  </div>
                );
              })}
            </div>
          </>
        ):(
          <div style={{textAlign:"center",padding:"32px 16px",color:t.textMuted}}>
            <div style={{fontSize:32,marginBottom:8}}>📊</div>
            No expenses in this range
          </div>
        )}
      </div>

      {/* ─────── Calendar card with own month navigation ─────── */}
      <div style={{background:t.bgCard,borderRadius:16,padding:"16px",border:`1px solid ${t.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif"}}>Daily Spending</div>
          <div style={{fontSize:12,color:t.textMuted,fontFamily:"monospace"}}>{fmtAmt(fromKZT(calMonthTotal,selectedCurrency,exchangeRates),selectedCurrency)}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,background:t.bgInput,borderRadius:10,padding:"6px 12px"}}>
          <button onClick={prevCalMonth} style={{background:"none",border:"none",color:t.accent,fontSize:18,cursor:"pointer",padding:"2px 6px"}}>‹</button>
          <span style={{fontSize:13,fontWeight:600,color:t.text}}>{MONTHS_FULL[calMonth]} {calYear}</span>
          <button onClick={nextCalMonth} style={{background:"none",border:"none",color:t.accent,fontSize:18,cursor:"pointer",padding:"2px 6px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,color:t.textMuted,paddingBottom:4,fontWeight:600}}>{d}</div>)}
          {Array.from({length:new Date(calYear,calMonth,1).getDay()}).map((_,i)=><div key={"e"+i}/>)}
          {dayTotals.map(({day,amount})=>{
            const hasSpending=amount>0;
            const displayAmount=hasSpending?fromKZT(amount,selectedCurrency,exchangeRates):0;
            return(
              <div key={day} style={{
                aspectRatio:"1",
                display:"flex",
                flexDirection:"column",
                alignItems:"center",
                justifyContent:"center",
                background:hasSpending?"#ef444415":"transparent",
                borderRadius:6,
                border:`1px solid ${hasSpending?"#ef444444":t.border}`,
                padding:"2px"
              }}>
                <div style={{fontSize:11,fontWeight:600,color:hasSpending?t.text:t.textMuted,lineHeight:1}}>{day}</div>
                {hasSpending&&(
                  <div style={{fontSize:9,fontWeight:600,color:"#ef4444",fontFamily:"monospace",marginTop:2,lineHeight:1}}>
                    {fmtCompact(displayAmount)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── HISTORY SCREEN ──
function HistoryScreen({transactions,accounts,categories,settings,onTxnClick,t}){
  const now=new Date();
  const[selYear,setSelYear]=useState(now.getFullYear());
  const[selMonth,setSelMonth]=useState(now.getMonth());
  const{selectedCurrency,exchangeRates}=settings;
  const prevMonth=()=>{if(selMonth===0){setSelYear(y=>y-1);setSelMonth(11);}else setSelMonth(m=>m-1);};
  const nextMonth=()=>{if(selMonth===11){setSelYear(y=>y+1);setSelMonth(0);}else setSelMonth(m=>m+1);};
  const monthTxns=transactions.filter(tx=>sameMonth(tx.date,selYear,selMonth)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grouped=useMemo(()=>{
    const g={};
    monthTxns.forEach(txn=>{
      const d=new Date(txn.date);
      const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if(!g[key])g[key]={label:d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),txns:[],total:0};
      g[key].txns.push(txn);
      if(txn.type==="expense")g[key].total-=toKZT(txn.amount,txn.currency,exchangeRates);
      else if(txn.type==="income")g[key].total+=toKZT(txn.amount,txn.currency,exchangeRates);
    });
    return Object.values(g);
  },[monthTxns,exchangeRates]);

  return(
    <div style={{height:"100%",overflow:"auto",padding:"calc(env(safe-area-inset-top, 20px) + 40px) 16px 16px"}}>
      <div style={{fontFamily:"system-ui,sans-serif",fontSize:22,fontWeight:700,color:t.text,marginBottom:16}}>History</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,background:t.bgCard,borderRadius:12,padding:"10px 16px",border:`1px solid ${t.border}`}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",color:t.accent,fontSize:22,cursor:"pointer",padding:"0 6px"}}>‹</button>
        <span style={{fontSize:16,fontWeight:600,color:t.text,fontFamily:"system-ui,sans-serif"}}>{MONTHS_FULL[selMonth]} {selYear}</span>
        <button onClick={nextMonth} style={{background:"none",border:"none",color:t.accent,fontSize:22,cursor:"pointer",padding:"0 6px"}}>›</button>
      </div>
      {grouped.length===0&&(
        <div style={{textAlign:"center",padding:"48px 0",color:t.textMuted}}>
          <div style={{fontSize:36,marginBottom:8}}>📭</div>
          <div style={{fontSize:15}}>No transactions this month</div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {grouped.map((g,gi)=>(
          <div key={gi}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:600,color:t.textMuted}}>{g.label}</span>
              <span style={{fontSize:13,fontWeight:600,color:g.total>=0?"#10b981":"#ef4444",fontFamily:"monospace"}}>{g.total>=0?"+":""}{fmtAmt(fromKZT(g.total,selectedCurrency,exchangeRates),selectedCurrency)}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {g.txns.map(txn=>{
                const acc=accounts.find(a=>a.id===txn.accountId);
                const toAcc=accounts.find(a=>a.id===txn.toAccountId);
                const cat=categories.find(c=>c.id===txn.categoryId);
                const sub=cat?.subcategories?.find(s=>s.id===txn.subcategoryId);
                const color=txn.type==="expense"?"#ef4444":txn.type==="income"?"#10b981":"#3b82f6";
                const sign=txn.type==="expense"?"-":txn.type==="income"?"+":"";
                const isTransfer=txn.type==="transfer";
                const showBothAmounts=isTransfer&&txn.toAmount!=null&&txn.toCurrency&&txn.toCurrency!==txn.currency;
                return(
                  <div key={txn.id} onClick={()=>onTxnClick(txn)} style={{background:t.bgCard,borderRadius:12,padding:"12px 14px",border:`1px solid ${t.border}`,cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
                        <div style={{width:34,height:34,borderRadius:9,background:(isTransfer?"#3b82f6":(cat?.color||"#64748b"))+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{isTransfer?"⇄":cat?.icon||"💸"}</div>
                        <div style={{minWidth:0,flex:1}}>
                          <div style={{fontSize:14,fontWeight:500,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                            {isTransfer?(
                              <span>{acc?.name||"?"} <span style={{color:t.textMuted}}>→</span> {toAcc?.name||"?"}</span>
                            ):(sub?sub.name:cat?.name)||"Unknown"}
                          </div>
                          <div style={{fontSize:11,color:t.textMuted}}>{fmtTime(txn.date)}{!isTransfer?` · ${acc?.name}`:""}{txn.note?` · ${txn.note.slice(0,22)}${txn.note.length>22?"…":""}`:""}</div>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:15,fontWeight:700,color,fontFamily:"monospace"}}>{sign}{fmtAmt(txn.amount,txn.currency)}</div>
                        {showBothAmounts&&(
                          <div style={{fontSize:11,color:t.textMuted,fontFamily:"monospace",marginTop:2}}>→ +{fmtAmt(txn.toAmount,txn.toCurrency)}</div>
                        )}
                      </div>
                    </div>
                    {txn.aiComment&&<PetCommentBlock comment={txn.aiComment} petEmoji={(PETS[settings.aiPet]||PETS.dog).emoji} t={t}/>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SETTINGS SCREEN ──
function SettingsScreen({accounts,categories,fixedExpenses,settings,onSettingsChange,onAccountsChange,onCategoriesChange,onFixedChange,onReset,onRefreshRates,t}){
  const[sec,setSec]=useState(null);
  const[editAccId,setEditAccId]=useState(null);
  const[editAccName,setEditAccName]=useState("");
  const[editAccCurrency,setEditAccCurrency]=useState("");
  const[newAccName,setNewAccName]=useState("");
  const[newAccType,setNewAccType]=useState("bank");
  const[newCatName,setNewCatName]=useState("");
  const[newCatIcon,setNewCatIcon]=useState("📌");
  const[newCatType,setNewCatType]=useState("expense");
  // Category expansion: which category is currently showing its subcategories
  const[expandedCatId,setExpandedCatId]=useState(null);
  // Per-category buffer for new subcategory name (keyed by category id)
  const[newSubName,setNewSubName]=useState("");
  const[newFeName,setNewFeName]=useState("");
  const[newFeAmt,setNewFeAmt]=useState("");
  const[newFeDay,setNewFeDay]=useState("1");
  const fileRef=useRef();

  const Toggle=({value,onChange})=>(
    <div onClick={onChange} style={{width:46,height:26,borderRadius:13,background:value?"#10b981":"#64748b",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{position:"absolute",top:3,left:value?22:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
    </div>
  );

  const Section=({k,label,icon})=>(
    <div onClick={()=>setSec(sec===k?null:k)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:t.bgCard,borderRadius:12,cursor:"pointer",border:`1px solid ${t.border}`,marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{fontSize:15,fontWeight:500,color:t.text}}>{label}</span>
      </div>
      <span style={{color:t.textMuted,fontSize:20,transform:sec===k?"rotate(90deg)":"",transition:"transform .2s",lineHeight:1}}>›</span>
    </div>
  );

  return(
    <div style={{height:"100%",overflow:"auto",padding:"calc(env(safe-area-inset-top, 20px) + 40px) 16px 16px"}}>
      <div style={{fontFamily:"system-ui,sans-serif",fontSize:22,fontWeight:700,color:t.text,marginBottom:16}}>Settings</div>

      {/* Profile */}
      <div style={{background:t.bgCard,borderRadius:16,padding:"16px",border:`1px solid ${t.border}`,marginBottom:12,display:"flex",alignItems:"center",gap:14}}>
        <div onClick={()=>fileRef.current?.click()} style={{cursor:"pointer",position:"relative",flexShrink:0}}>
          {settings.profilePicture
            ?<img src={settings.profilePicture} style={{width:58,height:58,borderRadius:"50%",objectFit:"cover"}} alt="profile"/>
            :<div style={{width:58,height:58,borderRadius:"50%",background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:24,color:"#fff"}}>{(settings.displayName||"U")[0]}</div>}
          <div style={{position:"absolute",bottom:0,right:0,width:20,height:20,background:"#10b981",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff"}}>✎</div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSettingsChange({...settings,profilePicture:ev.target.result});r.readAsDataURL(f);}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:t.textMuted,marginBottom:5}}>Display Name</div>
          <input value={settings.displayName||""} onChange={e=>onSettingsChange({...settings,displayName:e.target.value})} style={{background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"9px 12px",fontSize:15,width:"100%",fontFamily:"system-ui,sans-serif"}}/>
        </div>
      </div>

      {/* Quick Toggles */}
      <div style={{background:t.bgCard,borderRadius:14,padding:"14px 16px",border:`1px solid ${t.border}`,marginBottom:12}}>
        {[{l:"🌙 Dark Mode",k:"darkMode"},{l:"🤖 AI Coach",k:"aiEnabled"}].map(({l,k},i)=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:i===0?12:0,borderBottom:i===0?`1px solid ${t.border}`:"none",paddingTop:i===1?12:0}}>
            <span style={{fontSize:15,fontWeight:500,color:t.text}}>{l}</span>
            <Toggle value={settings[k]} onChange={()=>onSettingsChange({...settings,[k]:!settings[k]})}/>
          </div>
        ))}
      </div>

      <Section k="accounts" label="Accounts" icon="🏦"/>
      {sec==="accounts"&&(
        <div style={{background:t.bgCard2,borderRadius:12,padding:"12px",border:`1px solid ${t.border}`,marginBottom:8}}>
          {accounts.map(a=>{
            const isEditing=editAccId===a.id;
            const allowedCurrencies=getAccountCurrencies(a.type);
            return(
              <div key={a.id} style={{padding:"9px 0",borderBottom:`1px solid ${t.border}`}}>
                {isEditing?(
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:18}}>{a.icon}</span>
                      <input value={editAccName} onChange={e=>setEditAccName(e.target.value)} placeholder="Account name" style={{flex:1,minWidth:0,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:7,padding:"6px 10px",fontSize:14,fontFamily:"system-ui,sans-serif"}}/>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,color:t.textMuted,minWidth:60}}>Currency:</span>
                      <select value={editAccCurrency} onChange={e=>setEditAccCurrency(e.target.value)} style={{flex:1,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:7,padding:"6px 10px",fontSize:13,cursor:"pointer"}}>
                        {allowedCurrencies.map(c=><option key={c} value={c}>{sym[c]} {c}</option>)}
                      </select>
                    </div>
                    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                      <button onClick={()=>{onAccountsChange(accounts.map(x=>x.id===a.id?{...x,name:editAccName,currency:editAccCurrency}:x));setEditAccId(null);}} style={{background:"#10b981",border:"none",borderRadius:6,padding:"5px 12px",color:"#fff",cursor:"pointer",fontSize:12}}>Save</button>
                      <button onClick={()=>setEditAccId(null)} style={{background:t.bgInput,border:"none",borderRadius:6,padding:"5px 12px",color:t.textMuted,cursor:"pointer",fontSize:12}}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:18}}>{a.icon}</span>
                    <span style={{flex:1,fontSize:14,color:t.text,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name} <span style={{color:t.textMuted}}>({a.currency})</span></span>
                    <button onClick={()=>{setEditAccId(a.id);setEditAccName(a.name);setEditAccCurrency(a.currency);}} style={{background:t.bgInput,border:"none",borderRadius:6,padding:"5px 10px",color:t.textMuted,cursor:"pointer",fontSize:12,flexShrink:0}}>✎</button>
                    <button onClick={()=>{if(confirm(`Delete account "${a.name}"? This will not delete its transactions.`))onAccountsChange(accounts.filter(x=>x.id!==a.id));}} style={{background:"#ef444422",border:"none",borderRadius:6,padding:"5px 10px",color:"#ef4444",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{marginTop:10,display:"flex",gap:8}}>
            <input value={newAccName} onChange={e=>setNewAccName(e.target.value)} placeholder="Name" style={{flex:1,minWidth:0,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 10px",fontSize:14,fontFamily:"system-ui,sans-serif"}}/>
            <select value={newAccType} onChange={e=>setNewAccType(e.target.value)} style={{background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px",fontSize:13,flexShrink:0}}>
              <option value="bank">Bank</option><option value="crypto">Crypto</option>
            </select>
            <button onClick={()=>{if(!newAccName.trim())return;onAccountsChange([...accounts,{id:uid(),name:newAccName.trim(),type:newAccType,currency:newAccType==="crypto"?"USDT":"KZT",balance:0,icon:newAccType==="bank"?"🏦":"💰",color:"#10b981",isActive:true}]);setNewAccName("");}} style={{background:"#10b981",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:16,fontWeight:700,flexShrink:0}}>+</button>
          </div>
        </div>
      )}

      <Section k="categories" label="Categories" icon="🗂️"/>
      {sec==="categories"&&(
        <div style={{background:t.bgCard2,borderRadius:12,padding:"12px",border:`1px solid ${t.border}`,marginBottom:8}}>
          {/* Group categories by type for clearer Income vs Expense separation */}
          {["expense","income"].map(groupType=>{
            const groupCats=categories.filter(c=>{
              const ct=c.type||(/salary|income|loan|freelance/i.test(c.name)?"income":"expense");
              return ct===groupType;
            });
            if(groupCats.length===0)return null;
            const headerColor=groupType==="income"?"#10b981":"#ef4444";
            return(
              <div key={groupType} style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:headerColor,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6,paddingLeft:2}}>
                  {groupType==="income"?"💰 Income":"💸 Expense"} categories
                </div>
                {groupCats.map(c=>{
                  const isExpanded=expandedCatId===c.id;
                  const subs=c.subcategories||[];
                  return(
                    <div key={c.id} style={{background:t.bgInput,borderRadius:10,marginBottom:6,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",cursor:"pointer"}} onClick={()=>{setExpandedCatId(isExpanded?null:c.id);setNewSubName("");}}>
                        <span style={{fontSize:18}}>{c.icon}</span>
                        <span style={{flex:1,fontSize:14,color:t.text,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                        <span style={{color:t.textMuted,fontSize:11,flexShrink:0}}>{subs.length} sub</span>
                        <span style={{color:t.textMuted,fontSize:14,transform:isExpanded?"rotate(90deg)":"none",transition:"transform .15s"}}>›</span>
                        <button onClick={(e)=>{e.stopPropagation();if(confirm(`Delete category "${c.name}" and all its subcategories?`))onCategoriesChange(categories.filter(x=>x.id!==c.id));}} style={{background:"#ef444422",border:"none",borderRadius:6,padding:"4px 9px",color:"#ef4444",cursor:"pointer",fontSize:11,flexShrink:0}}>✕</button>
                      </div>
                      {isExpanded&&(
                        <div className="fade-in" style={{padding:"4px 12px 12px",borderTop:`1px solid ${t.border}`}}>
                          {subs.length===0&&(
                            <div style={{fontSize:11,color:t.textMuted,fontStyle:"italic",padding:"8px 4px"}}>No subcategories yet — add one below.</div>
                          )}
                          {subs.map(s=>(
                            <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px"}}>
                              <span style={{color:t.textMuted,fontSize:11}}>•</span>
                              <span style={{flex:1,fontSize:13,color:t.text}}>{s.name}</span>
                              <button onClick={()=>{
                                const updated=categories.map(cat=>cat.id===c.id?{...cat,subcategories:subs.filter(x=>x.id!==s.id)}:cat);
                                onCategoriesChange(updated);
                              }} style={{background:"transparent",border:"none",color:t.textMuted,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>✕</button>
                            </div>
                          ))}
                          <div style={{display:"flex",gap:6,marginTop:8}}>
                            <input
                              value={newSubName}
                              onChange={e=>setNewSubName(e.target.value)}
                              onKeyDown={e=>{
                                if(e.key==="Enter"&&newSubName.trim()){
                                  const updated=categories.map(cat=>cat.id===c.id?{...cat,subcategories:[...subs,{id:uid(),name:newSubName.trim()}]}:cat);
                                  onCategoriesChange(updated);
                                  setNewSubName("");
                                }
                              }}
                              placeholder="Subcategory name"
                              style={{flex:1,minWidth:0,background:t.bgCard,color:t.text,border:`1px solid ${t.border}`,borderRadius:7,padding:"7px 10px",fontSize:13,fontFamily:"system-ui,sans-serif"}}
                            />
                            <button onClick={()=>{
                              if(!newSubName.trim())return;
                              const updated=categories.map(cat=>cat.id===c.id?{...cat,subcategories:[...subs,{id:uid(),name:newSubName.trim()}]}:cat);
                              onCategoriesChange(updated);
                              setNewSubName("");
                            }} style={{background:"#10b981",border:"none",borderRadius:7,padding:"7px 14px",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>+</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}

          {/* Add new category form */}
          <div style={{paddingTop:12,borderTop:`1px solid ${t.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Add new category</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1px solid ${t.border}`,flexShrink:0}}>
                {["expense","income"].map(tt=>(
                  <button key={tt} onClick={()=>setNewCatType(tt)} style={{padding:"7px 10px",background:newCatType===tt?(tt==="income"?"#10b981":"#ef4444"):t.bgInput,color:newCatType===tt?"#fff":t.textMuted,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",textTransform:"uppercase"}}>{tt==="income"?"In":"Out"}</button>
                ))}
              </div>
              <input value={newCatIcon} onChange={e=>setNewCatIcon(e.target.value)} style={{width:44,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px",fontSize:18,textAlign:"center",flexShrink:0}}/>
              <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="Name" style={{flex:1,minWidth:0,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 10px",fontSize:14,fontFamily:"system-ui,sans-serif"}}/>
              <button onClick={()=>{if(!newCatName.trim())return;onCategoriesChange([...categories,{id:uid(),name:newCatName.trim(),icon:newCatIcon||"📌",color:newCatType==="income"?"#10b981":"#ef4444",type:newCatType,subcategories:[]}]);setNewCatName("");setNewCatIcon("📌");}} style={{background:"#10b981",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:16,fontWeight:700,flexShrink:0}}>+</button>
            </div>
            <div style={{fontSize:11,color:t.textMuted,marginTop:6,fontStyle:"italic"}}>💡 Tip: tap any category above to add subcategories to it.</div>
          </div>
        </div>
      )}

      <Section k="fixed" label="Fixed Expenses" icon="📅"/>
      {sec==="fixed"&&(
        <div style={{background:t.bgCard2,borderRadius:12,padding:"12px",border:`1px solid ${t.border}`,marginBottom:8}}>
          {fixedExpenses.map(fe=>(
            <div key={fe.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:`1px solid ${t.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:t.text,fontWeight:500}}>{fe.name}</div>
                <div style={{fontSize:11,color:t.textMuted}}>{fmtAmt(fe.amount,fe.currency)} · Day {fe.dayOfMonth}</div>
              </div>
              <button onClick={()=>onFixedChange(fixedExpenses.filter(x=>x.id!==fe.id))} style={{background:"#ef444422",border:"none",borderRadius:6,padding:"5px 10px",color:"#ef4444",cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          ))}
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
            <input value={newFeName} onChange={e=>setNewFeName(e.target.value)} placeholder="Name (e.g. Netflix)" style={{background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,fontFamily:"system-ui,sans-serif"}}/>
            <div style={{display:"flex",gap:8}}>
              <input value={newFeAmt} onChange={e=>setNewFeAmt(e.target.value)} placeholder="Amount ₸" type="number" style={{flex:1,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"9px 12px",fontSize:14}}/>
              <input value={newFeDay} onChange={e=>setNewFeDay(e.target.value)} placeholder="Day" type="number" min="1" max="31" style={{width:64,background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"9px 10px",fontSize:14,textAlign:"center"}}/>
              <button onClick={()=>{if(!newFeName.trim()||!newFeAmt)return;onFixedChange([...fixedExpenses,{id:uid(),name:newFeName.trim(),amount:+newFeAmt,currency:"KZT",dayOfMonth:+newFeDay||1,categoryId:"cat3",accountId:accounts[0]?.id}]);setNewFeName("");setNewFeAmt("");}} style={{background:"#10b981",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",cursor:"pointer",fontSize:16,fontWeight:700}}>+</button>
            </div>
          </div>
        </div>
      )}

      <Section k="ai" label="AI Coach Settings" icon="🤖"/>
      {sec==="ai"&&(
        <div style={{background:t.bgCard2,borderRadius:12,padding:"12px",border:`1px solid ${t.border}`,marginBottom:8,display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <div style={{fontSize:12,color:t.textMuted,marginBottom:8}}>Your AI Companion</div>
            <div style={{display:"flex",gap:10}}>
              {[{k:"dog",emoji:"🐶",label:"Dog",desc:"Loyal & supportive"},{k:"cat",emoji:"🐱",label:"Cat",desc:"Sassy & judgmental"}].map(({k,emoji,label,desc})=>{
                const active=settings.aiPet===k;
                return(
                  <div key={k} onClick={()=>onSettingsChange({...settings,aiPet:k})} style={{flex:1,padding:"14px 10px",borderRadius:12,border:`2px solid ${active?"#10b981":t.border}`,background:active?"#10b98122":t.bgInput,cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
                    <div style={{fontSize:32,marginBottom:4}}>{emoji}</div>

// Walks new users through setup: name, banks, crypto, pet, currency.
// Runs on first launch; skipped thereafter.
function OnboardingScreen({tgUser,onComplete}){
  const[step,setStep]=useState(0);
  const[name,setName]=useState(tgUser?.first_name||"");
  const[profilePic,setProfilePic]=useState(tgUser?.photo_url||null);
  const[selectedBanks,setSelectedBanks]=useState([]);
  const[selectedCrypto,setSelectedCrypto]=useState([]);
  const[customBankName,setCustomBankName]=useState("");
  const[customCryptoName,setCustomCryptoName]=useState("");
  const[pet,setPet]=useState("dog");
  const[currency,setCurrency]=useState("KZT");

  const toggleBank=(bankName)=>setSelectedBanks(s=>s.includes(bankName)?s.filter(x=>x!==bankName):[...s,bankName]);
  const toggleCrypto=(c)=>setSelectedCrypto(s=>s.includes(c)?s.filter(x=>x!==c):[...s,c]);

  const addCustomBank=()=>{
    const n=customBankName.trim();
    if(!n)return;
    if(!selectedBanks.includes(n))setSelectedBanks([...selectedBanks,n]);
    setCustomBankName("");
  };
  const addCustomCrypto=()=>{

    if(!selectedCrypto.includes(n))setSelectedCrypto([...selectedCrypto,n]);
