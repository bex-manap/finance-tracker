// ── MAIN APP ──
function App(){
  const[loaded,setLoaded]=useState(false);
  const[accounts,setAccountsRaw]=useState(DEF_ACCOUNTS);
  const[transactions,setTransactionsRaw]=useState([]);
  const[categories,setCategoriesRaw]=useState(DEF_CATS);
  const[fixedExpenses,setFixedRaw]=useState(DEF_FIXED);
  const[settings,setSettingsRaw]=useState(DEF_SETTINGS);
  const[tab,setTab]=useState("home");
  const[addModal,setAddModal]=useState(false);
  const[addMode,setAddMode]=useState("expense");
  const[selTxn,setSelTxn]=useState(null);

  const save=(key,val)=>{STORE.set(key,val).catch(()=>{});};
  const setAccounts=v=>{setAccountsRaw(v);save("ft_accounts",v);};
  const setTransactions=v=>{setTransactionsRaw(v);LS.set("ft_transactions",v);}; // full array only to localStorage; CS updates happen per-txn
  const setCategories=v=>{setCategoriesRaw(v);save("ft_categories",v);};
  const setFixed=v=>{setFixedRaw(v);save("ft_fixed",v);};
  const setSettings=v=>{setSettingsRaw(v);save("ft_settings",v);};

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      let accs=null,cats=null,sets=null,fxd=null,txns=[];
      try{
        // Try to load from CloudStorage first; falls back to localStorage if CS unavailable or times out.
        accs=await STORE.get("ft_accounts",null);
        cats=await STORE.get("ft_categories",null);
        sets=await STORE.get("ft_settings",null);
        fxd=await STORE.get("ft_fixed",null);
        txns=await STORE.getAllTransactions();
      }catch(e){
        console.error("Load error, falling back to localStorage:",e);
      }

      try{
        const isFirstRun=!accs&&!cats&&!sets;

        if(isFirstRun){
          // Brand new user — seed with empty data (user will add their own)
          accs=DEF_ACCOUNTS;
          cats=DEF_CATS;
          sets=DEF_SETTINGS;
          fxd=DEF_FIXED;
          txns=[];
          // Persist seed data (fire and forget — don't block UI)
          STORE.set("ft_accounts",accs).catch(()=>{});
          STORE.set("ft_categories",cats).catch(()=>{});
          STORE.set("ft_settings",sets).catch(()=>{});
          STORE.set("ft_fixed",fxd).catch(()=>{});
          LS.set("ft_init",true);
        } else {
          // Returning user — backfill any missing pieces with defaults
          accs=accs||LS.get("ft_accounts",DEF_ACCOUNTS);
          cats=cats||LS.get("ft_categories",DEF_CATS);
          sets=sets||LS.get("ft_settings",DEF_SETTINGS);
          fxd=fxd||LS.get("ft_fixed",DEF_FIXED);
          if(!txns||txns.length===0)txns=LS.get("ft_transactions",[]);
          // Merge with default settings so new fields (like aiPet) always have a value
          sets={...DEF_SETTINGS,...sets};
          // Existing users from before onboarding existed: if they have a displayName
          // or any accounts, treat them as already onboarded (don't force flow on them)
          if(sets.onboarded===undefined||sets.onboarded===false){
            if((accs&&accs.length>0)||(sets.displayName&&sets.displayName.length>0)){
              sets.onboarded=true;
            }
          }
          // One-time migration: if CloudStorage is available but hasn't been populated yet,
          // push everything from localStorage up to the cloud (fire and forget)
          if(CS_AVAILABLE&&!LS.get("ft_cs_migrated",false)){
            STORE.set("ft_accounts",accs).catch(()=>{});
            STORE.set("ft_categories",cats).catch(()=>{});
            STORE.set("ft_settings",sets).catch(()=>{});
            STORE.set("ft_fixed",fxd).catch(()=>{});
            for(const tx of txns)STORE.saveTransaction(tx).catch(()=>{});
            LS.set("ft_cs_migrated",true);
          }
        }
      }catch(e){
        console.error("Data prep error:",e);
        // Last resort fallback to defaults
        accs=accs||DEF_ACCOUNTS;
        cats=cats||DEF_CATS;
        sets=sets||DEF_SETTINGS;
        fxd=fxd||DEF_FIXED;
        txns=txns||[];
      }

      if(cancelled)return;

      // Always complete loading, no matter what happened above
      try{
        setAccountsRaw(accs||DEF_ACCOUNTS);
        setCategoriesRaw(cats||DEF_CATS);
        setSettingsRaw({...DEF_SETTINGS,...(sets||{})});
        setFixedRaw(fxd||DEF_FIXED);
        setTransactionsRaw(txns||[]);
      }catch(e){console.error("State set error:",e);}

      // Hide splash screen
      const splash=document.getElementById("splash");
      if(splash){splash.classList.add("hidden");setTimeout(()=>splash.remove(),300);}
      setLoaded(true);

      // Fetch live exchange rates in the background — refresh once per hour to avoid
      // hammering public APIs. Doesn't block app startup; if it fails, cached rates are used.
      try{
        const lastUpdate=sets?.lastRateUpdate||0;
        const hourAgo=Date.now()-3600000;
        if(lastUpdate<hourAgo){
          const liveRates=await fetchLiveRates();
          if(cancelled)return;
          // Only update rates that actually came back (partial updates OK)
          const mergedRates={...(sets?.exchangeRates||DEF_SETTINGS.exchangeRates),...liveRates};
          const updatedSettings={...DEF_SETTINGS,...(sets||{}),exchangeRates:mergedRates,lastRateUpdate:Date.now()};
          setSettingsRaw(updatedSettings);
          STORE.set("ft_settings",updatedSettings).catch(()=>{});
        }
      }catch(e){console.warn("Rate update failed, using cached rates:",e);}
    })();
    return()=>{cancelled=true;};
  },[]);

  // Helper: convert an amount from one currency to another using current rates.
  // All rates are stored as "1 UNIT = X KZT", so we go via KZT as the common base.
  const convertAmount=useCallback((amount,fromCurrency,toCurrency)=>{
    if(fromCurrency===toCurrency)return amount;
    const rates=settings.exchangeRates||{};
    const kztValue=amount*(rates[fromCurrency]||1);
    return kztValue/(rates[toCurrency]||1);
  },[settings.exchangeRates]);

  const handleSaveTxn=useCallback((txn)=>{
    const newTxns=[...transactions,txn];
    setTransactions(newTxns);
    STORE.saveTransaction(txn).catch(()=>{});
    const updAcc=accounts.map(a=>{
      if(txn.type==="income"&&a.id===txn.accountId){
        // Convert transaction currency into the account's native currency before adjusting balance
        const delta=convertAmount(txn.amount,txn.currency,a.currency);
        return{...a,balance:a.balance+delta};
      }
      if(txn.type==="expense"&&a.id===txn.accountId){
        const delta=convertAmount(txn.amount,txn.currency,a.currency);
        return{...a,balance:a.balance-delta};
      }
      if(txn.type==="transfer"){
        if(a.id===txn.accountId){
          // Deduct the outgoing amount (already in source account's currency)
          return{...a,balance:a.balance-txn.amount};
        }
        if(a.id===txn.toAccountId){
          // Add the converted amount — use precomputed toAmount if available, otherwise convert now
          const incoming=txn.toAmount!=null?txn.toAmount:convertAmount(txn.amount,txn.currency,a.currency);
          return{...a,balance:a.balance+incoming};
        }
      }
      return a;
    });
    setAccounts(updAcc);
  },[transactions,accounts,convertAmount]);

  const handleDeleteTxn=useCallback((id)=>{
    const txn=transactions.find(t=>t.id===id);
    if(!txn)return;
    const updAcc=accounts.map(a=>{
      if(txn.type==="income"&&a.id===txn.accountId){
        const delta=convertAmount(txn.amount,txn.currency,a.currency);
        return{...a,balance:a.balance-delta};
      }
      if(txn.type==="expense"&&a.id===txn.accountId){
        const delta=convertAmount(txn.amount,txn.currency,a.currency);
        return{...a,balance:a.balance+delta};
      }
      if(txn.type==="transfer"){
        if(a.id===txn.accountId)return{...a,balance:a.balance+txn.amount};
        if(a.id===txn.toAccountId){
          const incoming=txn.toAmount!=null?txn.toAmount:convertAmount(txn.amount,txn.currency,a.currency);
          return{...a,balance:a.balance-incoming};
        }
      }
      return a;
    });
    setAccounts(updAcc);
    setTransactions(transactions.filter(t=>t.id!==id));
    STORE.deleteTransaction(id).catch(()=>{});
  },[transactions,accounts,convertAmount]);

  // Reset all data: clears both localStorage and CloudStorage, then reloads the app
  const handleReset=useCallback(async()=>{
    try{
      // Clear localStorage keys used by this app
      ["ft_accounts","ft_categories","ft_settings","ft_fixed","ft_transactions","ft_init","ft_cs_migrated"]
        .forEach(k=>LS.remove(k));
      // Clear CloudStorage — remove all ft_* keys
      if(CS_AVAILABLE){
        const keys=await csGetKeys();
        const ftKeys=keys.filter(k=>k.startsWith("ft_"));
        for(const k of ftKeys){await csRemoveItem(k);}
      }
    }catch(e){console.error("Reset error:",e);}
    // Hard reload to re-initialize with empty defaults
    location.reload();
  },[]);

  // Manual refresh of exchange rates — bypasses the hourly cooldown
  const handleRefreshRates=useCallback(async()=>{
    try{
      haptic();
      const liveRates=await fetchLiveRates();
      const mergedRates={...settings.exchangeRates,...liveRates};
      setSettings({...settings,exchangeRates:mergedRates,lastRateUpdate:Date.now()});
    }catch(e){
      console.error("Rate refresh failed:",e);
      alert("Could not fetch rates. Check your connection and try again.");
    }
  },[settings]);

  const t=useMemo(()=>mkTheme(settings.darkMode),[settings.darkMode]);

  // Handle onboarding completion: save user's setup to settings + accounts
  const handleOnboardingComplete=useCallback((data)=>{
    const newSettings={...settings,
      displayName:data.displayName,
      profilePicture:data.profilePicture,
      aiPet:data.aiPet,
      selectedCurrency:data.selectedCurrency,
      onboarded:true
    };
    setSettings(newSettings);
    if(data.accounts&&data.accounts.length>0){
      setAccounts(data.accounts);
    }
  },[settings]);

  if(!loaded){
    return(
      <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0f1e"}}>
        <div style={{fontSize:48,marginBottom:16}}>💰</div>
        <div style={{fontFamily:"system-ui,sans-serif",fontSize:22,color:"#10b981",fontWeight:700}}>Finance Tracker</div>
        <div style={{fontSize:14,color:"#64748b",marginTop:8}}>Loading your data...</div>
      </div>
    );
  }

  // Show onboarding if user hasn't completed setup yet
  if(!settings.onboarded){
    const tgUser=window.Telegram?.WebApp?.initDataUnsafe?.user;
    return <OnboardingScreen tgUser={tgUser} onComplete={handleOnboardingComplete}/>;
  }

  const TABS=[
    {k:"home",icon:"🏠",label:"Home"},
    {k:"analytics",icon:"📊",label:"Analytics"},
    {k:"__add__",icon:"＋",label:""},
    {k:"history",icon:"📋",label:"History"},
    {k:"settings",icon:"⚙️",label:"Settings"},
  ];

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:t.bg,maxWidth:430,margin:"0 auto",position:"relative",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"hidden",position:"relative"}} className="fade-in">
        {tab==="home"&&<HomeScreen accounts={accounts} transactions={transactions} categories={categories} fixedExpenses={fixedExpenses} settings={settings} onSettingsChange={setSettings} onAddTxn={(mode)=>{setAddMode(mode);setAddModal(true);}} t={t} onTxnClick={setSelTxn}/>}
        {tab==="analytics"&&<AnalyticsScreen transactions={transactions} categories={categories} settings={settings} t={t}/>}
        {tab==="history"&&<HistoryScreen transactions={transactions} accounts={accounts} categories={categories} settings={settings} onTxnClick={setSelTxn} t={t}/>}
        {tab==="settings"&&<SettingsScreen accounts={accounts} categories={categories} fixedExpenses={fixedExpenses} settings={settings} onSettingsChange={setSettings} onAccountsChange={setAccounts} onCategoriesChange={setCategories} onFixedChange={setFixed} onReset={handleReset} onRefreshRates={handleRefreshRates} t={t}/>}
      </div>
      <div style={{flexShrink:0,display:"flex",alignItems:"center",background:t.tabBg,borderTop:`1px solid ${t.tabBorder}`,padding:"6px 0 calc(10px + env(safe-area-inset-bottom, 0px))",zIndex:50}}>
        {TABS.map(({k,icon,label})=>{
          const isAdd=k==="__add__";
          const active=tab===k;
          return(
            <button key={k} onClick={()=>{haptic();if(isAdd){setAddMode("expense");setAddModal(true);}else setTab(k);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
              {isAdd?(
                <div style={{width:50,height:50,borderRadius:"50%",background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,color:"#fff",marginTop:-18,boxShadow:"0 4px 20px rgba(16,185,129,0.55)",fontWeight:300}}>＋</div>
              ):(
                <>
                  <div style={{fontSize:22,filter:active?"none":"grayscale(80%)",opacity:active?1:0.55,transition:"opacity .15s"}}>{icon}</div>
                  <div style={{fontSize:10,fontWeight:active?600:400,color:active?t.accent:t.textMuted,fontFamily:"system-ui,sans-serif",transition:"color .15s"}}>{label}</div>
                </>
              )}
            </button>
          );
        })}
      </div>
      <AddModal open={addModal} onClose={()=>setAddModal(false)} accounts={accounts} categories={categories} settings={settings} onSave={handleSaveTxn} t={t} initMode={addMode}/>
      <TxnDetail txn={selTxn} open={!!selTxn} onClose={()=>setSelTxn(null)} accounts={accounts} categories={categories} onDelete={handleDeleteTxn} settings={settings} t={t}/>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
